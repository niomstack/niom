# Build Release — Cross-platform Tauri binary builds
#
# Triggered by:
#   1. release-please workflow (via workflow_call) — primary trigger
#   2. Manual dispatch — for re-running builds
#   3. Release event — fallback if using PAT in release-please

name: Build Release

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. niom-v0.1.0)"
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Intel (cross-compile on ARM runner)
          - platform: macos-15
            target: x86_64-apple-darwin
            node_target: darwin-x64
            label: macOS-Intel

          # macOS Apple Silicon
          - platform: macos-14
            target: aarch64-apple-darwin
            node_target: darwin-arm64
            label: macOS-ARM

          # Windows
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            node_target: win32-x64
            label: Windows

          # Linux
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            node_target: linux-x64
            label: Linux

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})
    environment: production

    steps:
      - uses: actions/checkout@v4

      # ── Node.js ──
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install sidecar dependencies
        run: pnpm --filter niom-ai install --frozen-lockfile

      # ── Rust ──
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Linux system deps ──
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      # ── macOS code signing setup ──
      - name: Import macOS signing certificate
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "⚠️  No signing certificate — building unsigned"
            exit 0
          fi
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      # ── Build ──
      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          TAG="${{ inputs.tag_name || github.event.release.tag_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building for tag: $TAG"

      # Only export notarization env vars when Apple secrets are configured
      - name: Configure macOS notarization
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          _APPLE_ID: ${{ secrets.APPLE_ID }}
          _APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          _APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$_APPLE_TEAM_ID" ]; then
            echo "APPLE_ID=$_APPLE_ID" >> $GITHUB_ENV
            echo "APPLE_PASSWORD=$_APPLE_PASSWORD" >> $GITHUB_ENV
            echo "APPLE_TEAM_ID=$_APPLE_TEAM_ID" >> $GITHUB_ENV
            echo "✅ Notarization configured"
          else
            echo "⚠️  No Apple Team ID — skipping notarization (ad-hoc signed only)"
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Node.js target for sidecar build script
          NIOM_TARGET: ${{ matrix.node_target }}
          # macOS signing: use ad-hoc (-) when no certificate is configured
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}
          # Windows signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: "NIOM ${{ steps.tag.outputs.tag }}"
          releaseDraft: false
          prerelease: true
          args: --target ${{ matrix.target }}

  # ── Update Scoop + Homebrew manifests with real hashes ──
  update-manifests:
    needs: build
    runs-on: ubuntu-latest
    name: Update Package Manifests
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: version
        shell: bash
        run: |
          TAG="${{ inputs.tag_name || github.event.release.tag_name }}"
          VERSION="${TAG#niom-v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Updating manifests for $TAG (version $VERSION)"

      - name: Download release assets and compute hashes
        id: hashes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          mkdir -p /tmp/assets

          echo "Downloading Windows installer..."
          gh release download "$TAG" --repo niomstack/niom \
            --pattern "niom_${VERSION}_x64-setup.exe" \
            --dir /tmp/assets || echo "⚠️ Windows exe not found"

          echo "Downloading macOS Intel DMG..."
          gh release download "$TAG" --repo niomstack/niom \
            --pattern "niom_${VERSION}_x64.dmg" \
            --dir /tmp/assets || echo "⚠️ macOS Intel dmg not found"

          echo "Downloading macOS ARM DMG..."
          gh release download "$TAG" --repo niomstack/niom \
            --pattern "niom_${VERSION}_aarch64.dmg" \
            --dir /tmp/assets || echo "⚠️ macOS ARM dmg not found"

          # Compute SHA256 hashes
          WIN_HASH=""; MAC_INTEL_HASH=""; MAC_ARM_HASH=""

          [ -f "/tmp/assets/niom_${VERSION}_x64-setup.exe" ] && \
            WIN_HASH=$(sha256sum "/tmp/assets/niom_${VERSION}_x64-setup.exe" | cut -d ' ' -f 1)
          [ -f "/tmp/assets/niom_${VERSION}_x64.dmg" ] && \
            MAC_INTEL_HASH=$(sha256sum "/tmp/assets/niom_${VERSION}_x64.dmg" | cut -d ' ' -f 1)
          [ -f "/tmp/assets/niom_${VERSION}_aarch64.dmg" ] && \
            MAC_ARM_HASH=$(sha256sum "/tmp/assets/niom_${VERSION}_aarch64.dmg" | cut -d ' ' -f 1)

          echo "Windows hash: $WIN_HASH"
          echo "macOS Intel hash: $MAC_INTEL_HASH"
          echo "macOS ARM hash: $MAC_ARM_HASH"

          echo "win_hash=$WIN_HASH" >> $GITHUB_OUTPUT
          echo "mac_intel_hash=$MAC_INTEL_HASH" >> $GITHUB_OUTPUT
          echo "mac_arm_hash=$MAC_ARM_HASH" >> $GITHUB_OUTPUT

      - name: Update Scoop manifest
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          WIN_HASH="${{ steps.hashes.outputs.win_hash }}"

          jq -n \
            --arg ver "$VERSION" \
            --arg hash "$WIN_HASH" \
            '{
              version: $ver,
              description: "NIOM — Neural Interface Operating Model. Ambient AI Desktop Assistant.",
              homepage: "https://niom.dev",
              license: "AGPL-3.0",
              architecture: {
                "64bit": {
                  url: ("https://github.com/niomstack/niom/releases/download/niom-v" + $ver + "/niom_" + $ver + "_x64-setup.exe#/setup.exe"),
                  hash: $hash
                }
              },
              installer: {
                script: [
                  "Start-Process -FilePath \"$dir\\setup.exe\" -ArgumentList \"/S\", \"/D=$dir\" -Wait"
                ]
              },
              uninstaller: {
                script: [
                  "Start-Process -FilePath \"$dir\\uninstall.exe\" -ArgumentList \"/S\" -Wait"
                ]
              },
              checkver: {
                github: "https://github.com/niomstack/niom",
                regex: "niom-v([\\d.]+)"
              },
              autoupdate: {
                architecture: {
                  "64bit": {
                    url: "https://github.com/niomstack/niom/releases/download/niom-v$version/niom_${version}_x64-setup.exe#/setup.exe"
                  }
                }
              }
            }' > bucket/niom.json

          echo "✅ Scoop manifest updated"
          cat bucket/niom.json

      - name: Update Homebrew Cask
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MAC_INTEL_HASH="${{ steps.hashes.outputs.mac_intel_hash }}"
          MAC_ARM_HASH="${{ steps.hashes.outputs.mac_arm_hash }}"

          cat > Casks/niom.rb << 'CASK_EOF'
          # Homebrew Cask formula for NIOM
          # Auto-updated by the build-release workflow after each release.
          #
          # Users install with:
          #   brew tap niomstack/niom https://github.com/niomstack/niom
          #   brew install --cask niom

          cask "niom" do
            version "NIOM_VERSION"

            if Hardware::CPU.intel?
              url "https://github.com/niomstack/niom/releases/download/niom-v#{version}/niom_#{version}_x64.dmg"
              sha256 "INTEL_HASH"
            else
              url "https://github.com/niomstack/niom/releases/download/niom-v#{version}/niom_#{version}_aarch64.dmg"
              sha256 "ARM_HASH"
            end

            name "NIOM"
            desc "Neural Interface Operating Model — Ambient AI Desktop Assistant"
            homepage "https://niom.dev"

            livecheck do
              url "https://github.com/niomstack/niom/releases/latest"
              regex(/niom-v(\d+(?:\.\d+)+)/i)
            end

            depends_on macos: ">= :monterey"

            app "niom.app"

            zap trash: [
              "~/.niom",
            ]
          end
          CASK_EOF

          # Strip leading whitespace from heredoc (YAML indentation)
          sed -i 's/^          //' Casks/niom.rb
          # Replace placeholders with actual values
          sed -i "s/NIOM_VERSION/${VERSION}/g" Casks/niom.rb
          sed -i "s/INTEL_HASH/${MAC_INTEL_HASH}/g" Casks/niom.rb
          sed -i "s/ARM_HASH/${MAC_ARM_HASH}/g" Casks/niom.rb

          echo "✅ Homebrew Cask updated"
          cat Casks/niom.rb

      - name: Commit and push manifest updates
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/niom.json Casks/niom.rb
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update package manifests for ${{ steps.version.outputs.tag }}"
            git push
            echo "✅ Manifests committed and pushed"
          fi
