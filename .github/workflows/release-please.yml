name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # ─── Step 1: Release Please ───────────────────────────────────────
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ─── Step 2: Build & Upload (only when release is created) ───────
  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # macOS: Code signing
      - name: Import macOS certificates
        if: matrix.platform == 'darwin'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
            security create-keychain -p "" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "" build.keychain
            security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          fi

      # Build the Electron app (make only — no publish)
      - name: Make distributables
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run make -- --arch=${{ matrix.arch }}

      # Generate electron-updater manifest files (latest.yml / latest-mac.yml / latest-linux.yml)
      # These are required by electron-updater to discover and verify updates.
      - name: Generate update manifests
        shell: bash
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          echo "Generating update manifests for v${VERSION}..."

          # Windows: latest.yml (from .exe installer)
          if [ "${{ matrix.platform }}" = "win32" ]; then
            EXE=$(find out/make -name "*.exe" -type f | head -1)
            if [ -n "$EXE" ]; then
              node scripts/generate-update-manifest.js "$EXE" "out/make/latest.yml" "$VERSION"
            fi
          fi

          # macOS: latest-mac.yml (from .zip — required for auto-update)
          if [ "${{ matrix.platform }}" = "darwin" ]; then
            ZIP=$(find out/make -name "*.zip" -type f | head -1)
            if [ -n "$ZIP" ]; then
              node scripts/generate-update-manifest.js "$ZIP" "out/make/latest-mac.yml" "$VERSION"
            fi
          fi

          # Linux: latest-linux.yml (from .deb)
          if [ "${{ matrix.platform }}" = "linux" ]; then
            DEB=$(find out/make -name "*.deb" -type f | head -1)
            if [ -n "$DEB" ]; then
              node scripts/generate-update-manifest.js "$DEB" "out/make/latest-linux.yml" "$VERSION"
            fi
          fi

      # Upload build artifacts + manifests to the EXISTING release-please release
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          echo "Uploading artifacts to release: $TAG"

          # Find all distributable files + manifest files
          find out/make -type f \( \
            -name "*.dmg" -o \
            -name "*.zip" -o \
            -name "*.exe" -o \
            -name "*.nupkg" -o \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "latest.yml" -o \
            -name "latest-mac.yml" -o \
            -name "latest-linux.yml" -o \
            -name "RELEASES" \
          \) | while read -r file; do
            echo "  Uploading: $(basename "$file")"
            gh release upload "$TAG" "$file" --clobber || true
          done
        shell: bash

      # Also upload as workflow artifacts (for debugging)
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: niom-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            out/make/**/*.dmg
            out/make/**/*.zip
            out/make/**/*.exe
            out/make/**/*.nupkg
            out/make/**/*.deb
            out/make/**/*.rpm
            out/make/**/latest*.yml
          if-no-files-found: ignore
