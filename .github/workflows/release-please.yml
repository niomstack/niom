name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # ─── Step 1: Release Please ───────────────────────────────────────
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ─── Step 2: Build & Upload (only when release is created) ───────
  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # macOS: Code signing
      - name: Import macOS certificates
        if: matrix.platform == 'darwin'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
            security create-keychain -p "" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "" build.keychain
            security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          fi

      # Build the Electron app (make only — no publish)
      - name: Make distributables
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run make -- --arch=${{ matrix.arch }}

      # Normalize artifact names: all lowercase, no spaces, no "Setup"
      # Forge produces names like "NIOM-0.1.9 Setup.exe" — we want "niom-0.1.9.exe"
      - name: Normalize artifact names
        shell: bash
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          echo "Normalizing artifact names..."
          mkdir -p out/release

          # Windows
          for f in $(find out/make -name "*.exe" -type f); do
            cp "$f" "out/release/niom-${VERSION}.exe"
            echo "  $(basename "$f") → niom-${VERSION}.exe"
          done

          # macOS DMG
          for f in $(find out/make -name "*.dmg" -type f); do
            cp "$f" "out/release/niom-${VERSION}-${ARCH}.dmg"
            echo "  $(basename "$f") → niom-${VERSION}-${ARCH}.dmg"
          done

          # macOS ZIP (needed for auto-update)
          for f in $(find out/make -name "*.zip" -type f); do
            cp "$f" "out/release/niom-${VERSION}-${ARCH}.zip"
            echo "  $(basename "$f") → niom-${VERSION}-${ARCH}.zip"
          done

          # Linux DEB
          for f in $(find out/make -name "*.deb" -type f); do
            cp "$f" "out/release/niom-${VERSION}.deb"
            echo "  $(basename "$f") → niom-${VERSION}.deb"
          done

          # Linux RPM
          for f in $(find out/make -name "*.rpm" -type f); do
            cp "$f" "out/release/niom-${VERSION}.rpm"
            echo "  $(basename "$f") → niom-${VERSION}.rpm"
          done

          # Squirrel files (nupkg, RELEASES) — keep as-is
          for f in $(find out/make -name "*.nupkg" -o -name "RELEASES" | grep -v "\.yml"); do
            cp "$f" "out/release/"
          done

          echo "Normalized artifacts:"
          ls -la out/release/

      # Generate electron-updater manifest files from normalized artifacts
      - name: Generate update manifests
        shell: bash
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          echo "Generating update manifests for v${VERSION}..."

          # Windows: latest.yml
          if [ "${{ matrix.platform }}" = "win32" ]; then
            node scripts/generate-update-manifest.js "out/release/niom-${VERSION}.exe" "out/release/latest.yml" "$VERSION"
          fi

          # macOS: latest-mac.yml
          if [ "${{ matrix.platform }}" = "darwin" ]; then
            node scripts/generate-update-manifest.js "out/release/niom-${VERSION}-${ARCH}.zip" "out/release/latest-mac.yml" "$VERSION"
          fi

          # Linux: latest-linux.yml
          if [ "${{ matrix.platform }}" = "linux" ]; then
            node scripts/generate-update-manifest.js "out/release/niom-${VERSION}.deb" "out/release/latest-linux.yml" "$VERSION"
          fi

      # Upload normalized artifacts to the release
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          echo "Uploading artifacts to release: $TAG"

          for file in out/release/*; do
            echo "  Uploading: $(basename "$file")"
            gh release upload "$TAG" "$file" --clobber || true
          done
        shell: bash

      # Also upload as workflow artifacts (for debugging)
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: niom-${{ matrix.platform }}-${{ matrix.arch }}
          path: out/release/*
          if-no-files-found: ignore
